services:
  pixel-war-react:
    container_name: pixel_war_react
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - pixel-war-network

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=pixel_war
      - POSTGRES_USER=pixelUser
      - POSTGRES_PASSWORD=pixelMDP
      - JWT_SECRET=change-this-secret
      - GOOGLE_CLIENT_ID=
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - pixel-war-network

  postgres:
    container_name: pixel_war_postgres
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: pixel_war
      POSTGRES_USER: pixelUser
      POSTGRES_PASSWORD: pixelMDP
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pixelUser -d pixel_war"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pixel-war-network

networks:
  pixel-war-network:
    driver: bridge

volumes:
  postgres_data:
