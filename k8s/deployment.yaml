# ============================================================
# PIXEL WAR - Kubernetes Manifests
# ============================================================
# Contient: Secret, ConfigMap, PVC, 3x Deployment+Service,
#           Middlewares Traefik, IngressRoute
# ============================================================

# --- Secret (credentials DB + JWT + Google) ---
apiVersion: v1
kind: Secret
metadata:
  name: pixel-war-secrets
  namespace: default
type: Opaque
stringData:
  POSTGRES_PASSWORD: "pixelMDP"
  JWT_SECRET: "change-this-to-a-real-secret-in-prod"
  GOOGLE_CLIENT_ID: "143422740984-trobjf5c44t861p0i363h4pch9lkr4nd.apps.googleusercontent.com"

---
# --- ConfigMap (variables non-sensibles) ---
apiVersion: v1
kind: ConfigMap
metadata:
  name: pixel-war-config
  namespace: default
data:
  POSTGRES_HOST: "pixel-war-postgres"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "pixel_war"
  POSTGRES_USER: "pixelUser"
  PORT: "8000"

---
# --- ConfigMap admin.yml ---
apiVersion: v1
kind: ConfigMap
metadata:
  name: pixel-war-admin-config
  namespace: default
data:
  admin.yml: |
    admins:
      - leojacksoon@gmail.com
      - armatys.alex@gmail.com

---
# --- PersistentVolume PostgreSQL (hostPath pour cluster sans StorageClass) ---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: pixel-war-postgres-pv
spec:
  capacity:
    storage: 2Gi
  accessModes:
    - ReadWriteOnce
  hostPath:
    path: /data/pixel-war-postgres
  persistentVolumeReclaimPolicy: Retain

---
# --- PersistentVolumeClaim PostgreSQL ---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pixel-war-postgres-pvc
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi

---
# ============================================================
# POSTGRESQL
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pixel-war-postgres
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pixel-war-postgres
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: pixel-war-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:17-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: pixel-war-config
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: pixel-war-config
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pixel-war-secrets
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "pixelUser", "-d", "pixel_war"]
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: pixel-war-postgres-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: pixel-war-postgres
  namespace: default
spec:
  selector:
    app: pixel-war-postgres
  ports:
    - port: 5432
      targetPort: 5432

---
# ============================================================
# API BACKEND
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pixel-war-api
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pixel-war-api
  template:
    metadata:
      labels:
        app: pixel-war-api
    spec:
      containers:
        - name: api
          image: 10.0.0.10:5000/pixel-war-api:latest
          ports:
            - containerPort: 8000
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: pixel-war-config
                  key: PORT
            - name: POSTGRES_HOST
              valueFrom:
                configMapKeyRef:
                  name: pixel-war-config
                  key: POSTGRES_HOST
            - name: POSTGRES_PORT
              valueFrom:
                configMapKeyRef:
                  name: pixel-war-config
                  key: POSTGRES_PORT
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: pixel-war-config
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: pixel-war-config
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pixel-war-secrets
                  key: POSTGRES_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: pixel-war-secrets
                  key: JWT_SECRET
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: pixel-war-secrets
                  key: GOOGLE_CLIENT_ID
          volumeMounts:
            - name: admin-config
              mountPath: /usr/src/app/admin.yml
              subPath: admin.yml
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: admin-config
          configMap:
            name: pixel-war-admin-config

---
apiVersion: v1
kind: Service
metadata:
  name: pixel-war-api
  namespace: default
spec:
  selector:
    app: pixel-war-api
  ports:
    - port: 8000
      targetPort: 8000

---
# ============================================================
# FRONTEND CLIENT
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pixel-war-client
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pixel-war-client
  template:
    metadata:
      labels:
        app: pixel-war-client
    spec:
      containers:
        - name: client
          image: 10.0.0.10:5000/pixel-war-client:latest
          ports:
            - containerPort: 5173
          readinessProbe:
            httpGet:
              path: /
              port: 5173
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "250m"

---
apiVersion: v1
kind: Service
metadata:
  name: pixel-war-client
  namespace: default
spec:
  selector:
    app: pixel-war-client
  ports:
    - port: 5173
      targetPort: 5173

---
# ============================================================
# TRAEFIK MIDDLEWARES
# ============================================================

# Strip /pixel-war du path avant d'envoyer au backend
# /pixel-war/api/boards -> /api/boards
# /pixel-war/socket.io  -> /socket.io
# /pixel-war/health      -> /health
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-pixel-war
  namespace: default
spec:
  stripPrefix:
    prefixes:
      - /pixel-war

---
# ============================================================
# TRAEFIK INGRESSROUTE
# ============================================================
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: pixel-war
  namespace: default
spec:
  entryPoints:
    - websecure
  routes:
    # 1) WebSocket Socket.IO
    - match: Host(`leo-jackson.com`) && PathPrefix(`/pixel-war/socket.io`)
      kind: Rule
      services:
        - name: pixel-war-api
          port: 8000
      middlewares:
        - name: strip-pixel-war

    # 2) API REST
    - match: Host(`leo-jackson.com`) && PathPrefix(`/pixel-war/api`)
      kind: Rule
      services:
        - name: pixel-war-api
          port: 8000
      middlewares:
        - name: strip-pixel-war

    # 3) Health check
    - match: Host(`leo-jackson.com`) && PathPrefix(`/pixel-war/health`)
      kind: Rule
      services:
        - name: pixel-war-api
          port: 8000
      middlewares:
        - name: strip-pixel-war

    # 4) Frontend (tout le reste sous /pixel-war)
    - match: Host(`leo-jackson.com`) && PathPrefix(`/pixel-war`)
      kind: Rule
      services:
        - name: pixel-war-client
          port: 5173
      middlewares:
        - name: strip-pixel-war

  tls:
    certResolver: letsencrypt