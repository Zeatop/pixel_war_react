name: Backend Postman Tests

on:
  push:
    branches:
      - main

jobs:
  postman-backend-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: pixel_war
          POSTGRES_USER: pixelUser
          POSTGRES_PASSWORD: pixelMDP
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pixelUser -d pixel_war"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: api/package-lock.json

      - name: Install API dependencies
        run: npm ci

      - name: Build API
        run: npm run build

      - name: Start API
        env:
          PORT: 8000
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: pixel_war
          POSTGRES_USER: pixelUser
          POSTGRES_PASSWORD: pixelMDP
          JWT_SECRET: ci-jwt-secret
          GOOGLE_CLIENT_ID: ""
        run: |
          nohup npm run start > ../api.log 2>&1 &
          echo $! > ../api.pid

      - name: Wait for API health endpoint
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8000/health > /dev/null; then
              echo "API is healthy"
              exit 0
            fi
            sleep 2
          done
          echo "API did not become healthy in time"
          exit 1

      - name: Run Postman collection with Newman
        run: npx --yes newman run documentation/pixel-war-backend.postman_collection.json --bail

      - name: Show API logs on failure
        if: failure()
        run: |
          echo "===== API logs ====="
          cat ../api.log || true

      - name: Stop API process
        if: always()
        run: |
          if [ -f ../api.pid ]; then
            kill "$(cat ../api.pid)" || true
          fi

