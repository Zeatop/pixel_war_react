name: Backend Postman Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  postman-backend-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and start API + Postgres with Docker Compose
        run: docker compose up -d --build postgres api

      - name: Wait for API health endpoint
        run: |
          for i in {1..40}; do
            if curl -fsS http://localhost:8000/health > /dev/null; then
              echo "API is healthy"
              exit 0
            fi
            sleep 3
          done
          echo "API did not become healthy in time"
          docker compose logs api postgres || true
          exit 1

      - name: Run Postman collection with Newman (Docker)
        run: |
          docker run --rm --network host \
            -v "${{ github.workspace }}/api/documentation:/etc/newman" \
            postman/newman:alpine \
            run /etc/newman/pixel-war-backend.postman_collection.json \
            --env-var baseUrl=http://localhost:8000 \
            --bail

      - name: Show Docker logs on failure
        if: failure()
        run: docker compose logs api postgres || true

      - name: Teardown Docker stack
        if: always()
        run: docker compose down -v --remove-orphans

